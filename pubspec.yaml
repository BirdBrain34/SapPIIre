name: sappiire
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  hugeicons: ^1.0.0
  mobile_scanner: ^5.1.0
  qr_flutter: ^4.1.0
  supabase_flutter: 2.0.0
  crypto: ^3.0.3
  encrypt: ^5.0.3
  camera: ^0.11.0
  google_mlkit_text_recognition: ^0.13.0
  permission_handler: ^11.0.0
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  url_launcher: ^6.2.0
  bcrypt: ^1.1.0
  shared_preferences: ^2.5.5
  web: ^1.1.1
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/Logo/sappiire_logo.png
    - assets/Logo/SPII_icon.png

flutter_launcher_icons:
  android: "launcher_icon"  
  image_path: "assets/Logo/SPII_icon.png"
  min_sdk_android: 21